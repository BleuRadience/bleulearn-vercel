<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BleuLearn — Vocabulary Builder</title>
  <link rel="stylesheet" href="/css/bleulearn.css">
  <link rel="icon" href="/assets/favicon.ico">
</head>
<body>
<div class="container">
  <div class="main-header">
    <a href="/games/" class="logo" style="text-decoration:none;">
      <div class="logo-icon">📚</div>
      <div><h1>BLEULEARN</h1><p>Games</p></div>
    </a>
    <div class="points-badge"><span>⭐</span><span class="points-display">⭐ 0</span></div>
  </div>
  <p class="breadcrumb"><a href="/">Home</a> → Vocabulary Builder</p>
  <div class="game-card">
    <h2 style="font-family:var(--font-display);color:var(--bleu-deep);">📚 Vocabulary Builder</h2>
    <p style="color:var(--gray);">Match the term to its documented definition. Every term comes from the BleuHistory Book or BleuLearn curriculum.</p>
    <div class="question-text" id="qtext">Loading...</div>
    <div class="options-grid" id="opts"></div>
    <div class="feedback-box hidden" id="fb"></div>
    <div style="text-align:center;margin-top:16px;display:none;" id="nxt">
      <button class="btn-primary" onclick="next()">Next →</button>
    </div>
  </div>
  <div class="site-footer">
    <strong style="color:var(--gold);font-family:var(--font-display)">BleuLearn</strong> — AvaBleu House HQ · 2026 ·
    <a href="/legal/terms.html">Terms</a> · <a href="/legal/privacy.html">Privacy</a>
  </div>
</div>
<script src="/js/bleulearn.js"></script>
<script>
const Qs = [
  {q:"What is the UN DRIP?",opts:["A trade agreement","UN Declaration on the Rights of Indigenous Peoples (2007)","A military treaty","A banking regulation"],c:1,pts:15},
  {q:"What is 'guanin'?",opts:["A type of corn","A Maya calendar system","An African gold-silver-copper alloy documented by Columbus","An Inca road measurement"],c:2,pts:20},
  {q:"What is partus sequitur ventrem?",opts:["Latin for 'the son follows the father'","1662 Virginia law making children of enslaved mothers enslaved","A Roman trade law","A Papal Bull"],c:1,pts:20},
  {q:"What is the Doctrine of Discovery?",opts:["A scientific principle","The legal principle that European nations could claim 'discovered' lands","A military doctrine","A banking law"],c:1,pts:15},
  {q:"What is a quipu?",opts:["A Maya codex","An Aztec calendar","An Inca knotted-string recording device","A Haudenosaunee treaty"],c:2,pts:15},
];
let cur=0;
function load(){
  const q=Qs[cur];
  document.getElementById('qtext').textContent=q.q;
  document.getElementById('opts').innerHTML=q.opts.map((o,i)=>
    `<button class="option-btn" onclick="check(${i})">${o}</button>`).join('');
  document.getElementById('fb').className='feedback-box hidden';
  document.getElementById('nxt').style.display='none';
}
function check(sel){
  const q=Qs[cur];
  document.querySelectorAll('.option-btn').forEach((b,i)=>{
    b.disabled=true;
    if(i===q.c)b.classList.add('correct');
    else if(i===sel&&sel!==q.c)b.classList.add('wrong');
  });
  const fb=document.getElementById('fb');
  if(sel===q.c){fb.textContent=`✅ Correct! +${q.pts} points`;fb.className='feedback-box correct';BleuLearn.addPoints(q.pts,'Vocabulary Builder');}
  else{fb.textContent=`❌ Correct answer: ${q.opts[q.c]}`;fb.className='feedback-box wrong';}
  if(cur+1<Qs.length)document.getElementById('nxt').style.display='block';
  else{fb.textContent+=' 🎉 Game complete! +25 bonus!';BleuLearn.addPoints(25,'Vocabulary Builder complete');}
}
function next(){cur++;load();}
load();
</script>
</body>
</html>
