<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BleuLearn — Virtual Field Trips</title>
  <link rel="stylesheet" href="/css/bleulearn.css">
  <link rel="icon" href="/assets/favicon.ico">
</head>
<body>
<div class="container">
  <div class="main-header">
    <a href="/" class="logo" style="text-decoration:none;">
      <div class="logo-icon">🌍</div>
      <div><h1>BLEULEARN</h1><p>Explore & Earn</p></div>
    </a>
    <div class="points-badge"><span>⭐</span><span class="points-display">⭐ 0</span></div>
  </div>
  <p class="breadcrumb"><a href="/">Home</a> → Virtual Field Trips</p>
  <div class="hero">
    <h1>🌍 Virtual Field Trips</h1>
    <p>Visit documented archives, historic sites, and museums. Every trip connects to a BleuLearn curriculum strand. Earn 25 points per visit.</p>
  </div>
  <div class="grid-3" id="trips"></div>
  <div class="site-footer">
    <strong style="color:var(--gold);font-family:var(--font-display)">BleuLearn</strong> — AvaBleu House HQ · 2026 ·
    <a href="/legal/terms.html">Terms</a> · <a href="/legal/privacy.html">Privacy</a>
  </div>
</div>
<script src="/js/bleulearn.js"></script>
<script>
const trips = [
  {n:"Smithsonian NMAAHC",loc:"Washington, D.C.",icon:"🏛️",strand:"BleuHistory",url:"https://nmaahc.si.edu",pts:25},
  {n:"National Archives",loc:"Washington, D.C.",icon:"📜",strand:"Primary Source Literacy",url:"https://archives.gov",pts:25},
  {n:"Library of Congress",loc:"Washington, D.C.",icon:"📚",strand:"All Strands",url:"https://loc.gov",pts:25},
  {n:"Trans-Atlantic Slave Trade Database",loc:"slavevoyages.org",icon:"🚢",strand:"BleuHistory Vol. 5",url:"https://slavevoyages.org",pts:30},
  {n:"Cahokia Mounds State Historic Site",loc:"Collinsville, Illinois",icon:"⛰️",strand:"BleuHistory Vol. 2",url:"https://cahokiamounds.org",pts:25},
  {n:"Pamunkey Nation",loc:"King William County, Virginia",icon:"🦅",strand:"Indigenous Studies",url:"https://pamunkey.org",pts:25},
  {n:"Smithsonian Natural History",loc:"Washington, D.C.",icon:"🦴",strand:"Science",url:"https://naturalhistory.si.edu",pts:25},
  {n:"UNESCO World Heritage Sites",loc:"whc.unesco.org",icon:"🌐",strand:"Geography",url:"https://whc.unesco.org",pts:25},
  {n:"Equal Justice Initiative",loc:"Montgomery, Alabama",icon:"⚖️",strand:"BleuHistory Vol. 8",url:"https://eji.org",pts:30},
];
document.getElementById('trips').innerHTML = trips.map(t=>
  `<div class="card card-interactive">
    <div style="font-size:48px;text-align:center;margin-bottom:12px;">${t.icon}</div>
    <h3 style="font-family:var(--font-display);text-align:center;font-size:15px;">${t.n}</h3>
    <p style="color:var(--gray);text-align:center;font-size:12px;">${t.loc}</p>
    <span class="tag tag-navy" style="display:block;text-align:center;margin:8px auto;width:fit-content;">${t.strand}</span>
    <div style="display:flex;gap:8px;margin-top:12px;">
      <a href="${t.url}" target="_blank" class="btn-outline" style="flex:1;text-align:center;font-size:13px;">Visit Site</a>
      <button class="btn-primary" style="flex:1;font-size:13px;" onclick="BleuLearn.addPoints(${t.pts},'Visited ${t.n}')">+${t.pts} ⭐</button>
    </div>
  </div>`).join('');
</script>
</body>
</html>
